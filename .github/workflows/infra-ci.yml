name: infra-ci
on:
  push:
    branches:
      - release
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f infra/docker/compose/docker-compose.yml
      - run: kubectl kustomize infra/kubernetes/overlays/dev > /tmp/dev.yaml
