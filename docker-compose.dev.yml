services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-entregamais/backend:dev}
    environment:
      - ENVIRONMENT=dev
      - LOG_LEVEL=debug
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      - REDIS_ADDR=redis:${REDIS_PORT}
      - MINIO_ENDPOINT=minio:${MINIO_PORT}
      - MINIO_BUCKET=uploads
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:${RABBITMQ_PORT}/
      - KEYCLOAK_ISSUER_URL=http://keycloak:8080/realms/delivery-platform
    depends_on:
      - postgres
      - redis
      - minio
      - rabbitmq

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-entregamais/frontend:dev}
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:${APISIX_PROXY_PORT}
      - NEXT_PUBLIC_KEYCLOAK_URL=http://localhost:${KEYCLOAK_PORT}/realms/delivery-platform
      - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=frontend
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - gateway

  gateway:
    image: apache/apisix:3.12.0-debian
    volumes:
      - ./gateway/config/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ./gateway/routes/routes.yaml:/usr/local/apisix/conf/apisix.d/routes.yaml:ro
    ports:
      - "${APISIX_PROXY_PORT}:9080"
      - "${APISIX_ADMIN_PORT}:9180"
    depends_on:
      - backend
      - keycloak

  keycloak:
    build: ./auth
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres-auth:${POSTGRES_AUTH_PORT}/${POSTGRES_AUTH_DB}
      - KC_DB_USERNAME=${POSTGRES_AUTH_USER}
      - KC_DB_PASSWORD=${POSTGRES_AUTH_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT}:8080"
    depends_on:
      - postgres-auth

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  postgres-auth:
    image: postgres:16
    environment:
      - POSTGRES_DB=${POSTGRES_AUTH_DB}
      - POSTGRES_USER=${POSTGRES_AUTH_USER}
      - POSTGRES_PASSWORD=${POSTGRES_AUTH_PASSWORD}
    ports:
      - "${POSTGRES_AUTH_PORT}:5432"
    volumes:
      - ./postgres-auth/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT}:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000"
      - "9001:9001"

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "15672:15672"
