services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-entregamais/backend:test}
    restart: on-failure
    environment:
      - ENVIRONMENT=test
      - LOG_LEVEL=debug
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - REDIS_ADDR=redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_BUCKET=test-uploads
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
      - KEYCLOAK_ISSUER_URL=http://keycloak:8080/realms/delivery-platform
      - KEYCLOAK_JWKS_URL=http://keycloak:8080/realms/delivery-platform/protocol/openid-connect/certs
    depends_on:
      - postgres
      - redis
      - minio
      - rabbitmq

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-entregamais/frontend:test}
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:${APISIX_PROXY_PORT}
      - BACKEND_INTERNAL_URL=http://backend:8080
      - NEXT_PUBLIC_KEYCLOAK_URL=http://localhost:${KEYCLOAK_PORT}/realms/delivery-platform
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080/realms/delivery-platform
      - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=frontend
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - gateway

  gateway:
    image: apache/apisix:3.12.0-debian
    environment:
      - APISIX_STAND_ALONE=true
    volumes:
      - ./gateway/config/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./gateway/config/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ./gateway/routes/routes.yaml:/usr/local/apisix/conf/apisix.d/routes.yaml:ro
    ports:
      - "${APISIX_PROXY_PORT}:9080"
    depends_on:
      - backend
      - keycloak

  keycloak:
    build: ./auth
    restart: on-failure
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres-auth:5432/${POSTGRES_AUTH_DB}
      - KC_DB_USERNAME=${POSTGRES_AUTH_USER}
      - KC_DB_PASSWORD=${POSTGRES_AUTH_PASSWORD}
    depends_on:
      - postgres-auth

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  postgres-auth:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_AUTH_DB}
      - POSTGRES_USER=${POSTGRES_AUTH_USER}
      - POSTGRES_PASSWORD=${POSTGRES_AUTH_PASSWORD}

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}

  rabbitmq:
    image: rabbitmq:3.13-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}

  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    ports:
      - "19100:3100"

  promtail:
    image: grafana/promtail:3.0.0
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "15601:3000"
    depends_on:
      - loki
