<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Motor Fiscal</title>
  <link rel="stylesheet" href="/static/app.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
</head>
<body style="background: var(--ze-yellow);">
  <div class="login-container">
    <div class="login-visual" style="background: transparent;">
      <div style="margin-bottom: 2rem;">
        <span class="logo" style="font-size: 3rem; letter-spacing: -2px;">ENTREGA<span style="color: var(--ze-red);">MAIS</span></span>
      </div>
      <h1 style="font-size: 6rem; line-height: 0.8; margin-bottom: 2rem;">MOTOR<br/>FISCAL</h1>
      
      <div style="margin-top: 2rem; font-weight: 900; text-transform: uppercase; font-style: italic; opacity: 0.8; font-size: 1.2rem;">
        Calculo de impostos <br/>
        Snapshots de faturamento <br/>
        Integracao Dolibarr
      </div>
    </div>

    <div class="login-form-side" style="background: transparent;">
      <div class="card" style="width: 100%; max-width: 440px; padding: 3rem; background: white;">
        <div style="margin-bottom: 2.5rem; text-align: center;">
          <h2 style="font-size: 2.5rem; line-height: 1; margin-bottom: 0.5rem;">ENTRAR</h2>
          <p class="eyebrow" style="color: var(--ze-black); opacity: 0.6;">Acesso administrativo restrito</p>
        </div>

        {{if .Error}}
        <div class="flash error" style="margin-bottom: 1.5rem; border-radius: 12px; font-size: 0.875rem;">
          {{.Error}}
        </div>
        {{end}}

        <form action="/auth/login" method="POST" class="stack">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="admin@entregamais.com" required>
          </div>
          
          <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label for="password">Senha</label>
              <a href="#" style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase; opacity: 0.5;">Esqueceu?</a>
            </div>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>

          <button type="submit" class="primary" style="width: 100%; height: 4rem; font-size: 1.25rem; margin-top: 1rem;">
            Entrar Agora
          </button>
        </form>

        <div style="margin-top: 2.5rem; padding-top: 2rem; border-top: 2px solid var(--ze-gray); text-align: center;">
          <p style="font-size: 0.75rem; font-weight: 900; text-transform: uppercase; color: var(--muted);">
            Motor Fiscal v0.1.0 &copy; 2026
          </p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
