routes:
  # 1. Frontend Assets
  - id: frontend-assets
    uri: /_next/*
    priority: 30
    upstream:
      type: roundrobin
      nodes:
        "frontend:3000": 1

  # 2. Keycloak Public endpoints
  - id: keycloak-public
    uris:
      - /realms/*
      - /resources/*
      - /js/*
    priority: 28
    upstream:
      type: roundrobin
      nodes:
        "keycloak:8080": 1

  # 3. API Hosts
  - id: backend-hosts
    hosts:
      - "api.192.168.10.222.nip.io"
      - "backend.192.168.10.222.nip.io"
    uri: /*
    priority: 25
    upstream:
      type: roundrobin
      nodes:
        "backend:8080": 1
    plugins:
      cors: {}

  # 4. Auth (Keycloak) Hosts
  - id: keycloak-hosts
    hosts:
      - "auth.192.168.10.222.nip.io"
      - "keycloak.192.168.10.222.nip.io"
    uri: /*
    priority: 24
    upstream:
      type: roundrobin
      nodes:
        "keycloak:8080": 1

  # 5. ERP (Dolibarr) Hosts
  - id: erp-hosts
    hosts:
      - "erp.192.168.10.222.nip.io"
      - "dolibarr.192.168.10.222.nip.io"
    uri: /*
    priority: 24
    upstream:
      type: roundrobin
      nodes:
        "dolibarr:80": 1

  # 6. Fiscal Module Hosts
  - id: fiscal-hosts
    hosts:
      - "fiscal.192.168.10.222.nip.io"
    uri: /*
    priority: 24
    upstream:
      type: roundrobin
      nodes:
        "fiscal:8090": 1

  # 7. Grafana Hosts
  - id: grafana-hosts
    hosts:
      - "grafana.192.168.10.222.nip.io"
    uri: /*
    priority: 24
    upstream:
      type: roundrobin
      nodes:
        "grafana:3000": 1

  # 8. MinIO Hosts
  - id: minio-hosts
    hosts:
      - "storage.192.168.10.222.nip.io"
      - "storage-console.192.168.10.222.nip.io"
    uri: /*
    priority: 24
    upstream:
      type: roundrobin
      nodes:
        "minio:9000": 1

  # 9. Frontend Main Proxy
  - id: frontend-main
    hosts:
      - "entregamais.192.168.10.222.nip.io"
      - "frontend.192.168.10.222.nip.io"
      - "192.168.10.222.nip.io"
    uri: /*
    priority: 10
    upstream:
      type: roundrobin
      nodes:
        "frontend:3000": 1

  # 10. Global Fallback
  - id: global-fallback
    uri: /*
    priority: 1
    upstream:
      type: roundrobin
      nodes:
        "frontend:3000": 1
#END
