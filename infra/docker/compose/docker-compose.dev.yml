services:
  backend:
    # Internal only
    ports: []
  frontend:
    # Internal only
    ports: []
    volumes:
      - ../../../frontend:/app
      - /app/node_modules
    command: npx vinext dev -p 3000 --hostname 0.0.0.0
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
  gateway:
    # Expose APISIX on port 80 and 443 for HTTPS
    ports: ["80:9080", "443:9443", "9180:9180"]
  keycloak:
    ports: []
  fiscal:
    ports: []
  postgres:
    ports: ["5432:5432"]
  postgres-auth:
    ports: ["5433:5432"]
  dolibarr-db:
    ports: ["13306:3306"]
  dolibarr:
    ports: []
  redis:
    ports: ["6379:6379"]
  minio:
    ports: []
  rabbitmq:
    ports: []
  loki:
    ports: []
  grafana:
    ports: []
