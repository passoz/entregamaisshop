services:
  backend:
    ports: ["8080:8080"]
  frontend:
    ports: ["3000:3000"]
    volumes:
      - ../../../frontend:/app
      - /app/node_modules
    command: npx vinext dev -p 3000 --hostname 0.0.0.0
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
  gateway:
    ports: ["80:9080", "9180:9180"]
  keycloak:
    ports: ["8081:8080"]
  fiscal:
    ports: ["8090:8090"]
  postgres:
    ports: ["5432:5432"]
  postgres-auth:
    ports: ["5433:5432"]
  dolibarr-db:
    ports: ["13306:3306"]
  dolibarr:
    ports: ["8088:80"]
  redis:
    ports: ["6379:6379"]
  minio:
    ports: ["9000:9000", "9001:9001"]
  rabbitmq:
    ports: ["5672:5672", "15672:15672"]
  loki:
    ports: ["3100:3100"]
  grafana:
    ports: ["3001:3000"]
