resources:
  - ../../base

configMapGenerator:
  - name: service-config
    literals:
      - ENVIRONMENT=test
      - LOG_LEVEL=debug
      - DATABASE_URL=postgres://test_user:test_pass@postgres:5432/entregamais_test?sslmode=disable

patches:
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: entregamais/backend:test
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: entregamais/frontend:test
